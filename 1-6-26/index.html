<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive India map with clickable states and union territories." />
  <title>Interactive India Map</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <h1>Interactive India Map</h1>
        <p>Touch or click any state to reveal its key points.</p>
      </div>
    </header>

    <main class="main-grid">
      <section class="map-panel">
        <div class="map-intro">
          <h2>India Map</h2>
          <p>The complete map displays all 28 states and 8 union territories.</p>
        </div>

        <div class="svg-shell">
          <img class="map-base-image" src="assets/images/india-map.png" alt="India map background" />
          <svg id="indiaMap" class="india-map" viewBox="0 0 1000 1330" aria-labelledby="mapTitle mapDesc" role="img">
            <title id="mapTitle">India map with states and union territories</title>
            <desc id="mapDesc">Click any region to see state details in the panel.</desc>

            <g class="map-regions">
              <path id="ladakh" class="map-state" data-state="Ladakh" d="M560 40 L705 40 L740 140 L620 170 L560 150 Z" />
              <path id="jammu-and-kashmir" class="map-state" data-state="Jammu and Kashmir" d="M280 60 L550 80 L620 170 L420 170 Z" />

              <path id="punjab" class="map-state" data-state="Punjab" d="M260 230 L340 230 L360 290 L260 290 Z" />
              <path id="chandigarh" class="map-state" data-state="Chandigarh" d="M340 270 L360 270 L360 290 L340 290 Z" />

              <path id="uttar-pradesh" class="map-state" data-state="Uttar Pradesh" d="M325 340 L500 340 L500 450 L330 450 Z" />
              <path id="bihar" class="map-state" data-state="Bihar" d="M505 345 L600 345 L600 415 L505 415 Z" />

              <path id="nagaland" class="map-state" data-state="Nagaland" d="M840 330 L900 330 L900 380 L840 380 Z" />

              <text class="state-label" x="345" y="285">Chandigarh</text>

              <text class="state-label" x="790" y="380">Tripura</text>
              <text class="state-label" x="745" y="330">Meghalaya</text>
              <text class="state-label" x="175" y="1125">Lakshadweep</text>
              <text class="state-label" x="845" y="1030">Andaman & Nicobar</text>
            </g>
          </svg>
        </div>
      </section>

      <aside class="details-panel">
        <div class="details-header">
          <h2 id="detailsTitle">Select a state</h2>
          <p id="detailsSubtitle">Click a region on the map to see five important points.</p>
        </div>
        <div class="details-list" id="detailsList">
          <p class="note">State information appears here after selection.</p>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
